<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — Eleven Craft Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #94a3b8;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    .card { text-align: center; max-width: 420px; }
    .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; }
    h1 { font-size: 1.25rem; color: #f1f5f9; margin-bottom: 0.75rem; }
    p { font-size: 0.875rem; line-height: 1.6; color: #64748b; margin-bottom: 2rem; }
    .btn {
      display: inline-block; padding: 0.625rem 1.5rem; border-radius: 0.5rem;
      background: #4f46e5; color: #fff; border: none; font-size: 0.875rem;
      cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .btn:hover { background: #6366f1; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 512 512" fill="none">
      <rect width="512" height="512" rx="64" fill="#4f46e5"/>
      <path d="M120 160h272v32H120zm0 80h272v32H120zm0 80h192v32H120z" fill="#fff"/>
      <circle cx="400" cy="400" r="48" fill="#fbbf24" stroke="#0f172a" stroke-width="6"/>
      <path d="M400 380v20l12 12" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <h1>You're offline</h1>
    <p>No internet connection detected. Eleven Craft Studio works fully offline — your documents are saved locally on this device.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
